---

# Configure certain nitty-gritty details specific to k3s on all cluster nodes.

- name: Update the /etc/hosts file with localhost name
  lineinfile:
    path: /etc/hosts
    regexp: "^127.0.0.1"
    line: "127.0.0.1 {{ inventory_hostname }}"

- name: Update the /etc/hosts file with other cluster nodes' IP and hostname
  lineinfile:
    path: /etc/hosts
    regexp: ".*{{ item }}$"
    line: "{{ hostvars[item].ansible_default_ipv4.address }} {{ item }}"
    state: present
  with_items: "{{ groups.all | difference([inventory_hostname]) }}"
  
- name: Enable ip forwarding
  lineinfile:
    path: /etc/sysctl.conf
    search_string: "#net.ipv4.ip_forward=1"
    line: net.ipv4.ip_forward=1

- name: Update /etc/cloud/cloud.cfg file for a changed host name to persist reboots
  lineinfile:
    path: /etc/cloud/cloud.cfg
    regexp: "^preserve_hostname:"
    line: "preserve_hostname: true"
#  register: command_result
#  failed_when:
#    - command_result.failed == true
#    - "'Destination /etc/cloud/cloud.cfg does not exist !' not in command_result.msg"
#  ignore_errors: true
#- name: Checking cloud.cfg update result  
#  debug: msg="{{command_result}}"
  
- name: Clean up netplan config
  replace:
    path: /etc/netplan/50-cloud-init.yaml
    after: "following:"
    regexp: '^(.*)$'
    replace: ''

- name: Configure Static IP address for netplan
# Note that ansible_default_ipv4.address belongs to the static DHCP pool and was set based host's MAC address. That
# means the IP address does not change and Ansible continues to maintain ssh connectivity to the host. However, if our address
# assignment method relied on changing the IP address on-the-fly than Ansible ssh connection to the host would break. In that
# case waiting for reconnection of Ansible would be needed (and possibly also networking settings on the hosts and on the
# management host would need to be updated); see this for Ansible reconnection:
# https://stackoverflow.com/questions/60181867/ansible-is-there-a-way-to-change-a-windows-server-ip-address-using-ansible/61299910#61299910
  blockinfile:
    path: /etc/netplan/50-cloud-init.yaml
    insertafter: "following:"
    block: |
      network:
        ethernets:
          eth0:
            dhcp4: false
            addresses: [{{ ansible_default_ipv4.address }}/24]
            gateway4: {{ gateway }}
            nameservers:
              addresses: [{{ gateway }}, 8.8.8.8, 8.8.4.4]
        version: 2

- name: Apply network configuration with netplan (on Raspberry Pi OS need to install netplan before)
# Notice that because of setting the IP address as fixed BUT not changing it's value, Ansible ssh
# connection to the host remains active (does not break). See also the note in the previous task.
  shell: netplan apply

- name: Enable cgroup according to https://docs.k3s.io/advanced#raspberry-pi
  replace:
    path: /boot/firmware/cmdline.txt
    regexp: '^([\w](?!.*\b{{ item }}\b).*)$'
    replace: '\1 {{ item }}'
  with_items:
  - "cgroup_enable=cpuset"
  - "cgroup_memory=1"
  - "cgroup_enable=memory"
  register: cgroup_activation

- name: Reboot if something changed in the cgroup_* settings
  reboot:
  when:
  - cgroup_activation is changed
